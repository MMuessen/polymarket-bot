version: '3.8'
services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4096M
    restart: always

  bot:
    build: .
    container_name: kalshi_bot
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./kalshi_private_key.pem:/app/kalshi_private_key.pem:ro
    restart: always
