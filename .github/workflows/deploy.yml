name: Sentinel Auto-Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v3

      - name: Rapid Hot-Reload
        run: |
          cd /home/agent/polymarket-bot
          # REMOVED HYPHEN: 'docker compose' (with a space) is the modern engine 
          # that fixes the 'ContainerConfig' error
          sudo docker compose up -d --build --force-recreate
          sudo docker image prune -f
