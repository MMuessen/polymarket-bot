name: Sentinel Auto-Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v3

      - name: Rapid Hot-Reload
        run: |
          cd /home/agent/polymarket-bot
          # Using modern command and forcing a recreate to kill the 'zombie' logic
          sudo docker compose up -d --build --force-recreate
