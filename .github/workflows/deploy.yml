name: Sentinel Auto-Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v3

      - name: Deploy Update
        run: |
          cd /home/agent/polymarket-bot
          # Modern command: no hyphen in compose, -d is after the 'up' verb
          sudo docker compose up -d --build --force-recreate
