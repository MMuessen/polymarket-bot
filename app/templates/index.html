<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KalshiTerminal V10.2 - Full Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f111a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #1a1d2e; border: 1px solid #2d314d; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter">KALSHI<span class="text-blue-500">TERMINAL</span></h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">V10.2 / Intelligence Model Active</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-blue-500 uppercase font-black mb-1">High-Fidelity Paper Balance</p>
            <p id="balancePaper" class="text-3xl font-mono font-bold text-blue-400">$0.00</p>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3 space-y-6">
            <div class="card p-6 rounded-2xl border-red-900/40 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs font-black text-red-500 tracking-widest uppercase">API Vault</h3>
                    <span id="vault_status" class="text-[10px] font-bold px-2 py-1 rounded bg-red-950 text-red-400">NO KEYS</span>
                </div>
                <div class="space-y-4">
                    <input type="password" id="api_key_id" placeholder="Kalshi Key ID" class="w-full bg-[#0f111a] border border-slate-700 p-3 rounded-xl text-xs focus:border-red-500 outline-none">
                    <textarea id="priv_key_body" placeholder="Paste .pem Private Key Content" class="w-full bg-[#0f111a] border border-slate-700 p-3 rounded-xl h-24 text-[10px] font-mono focus:border-red-500 outline-none"></textarea>
                    <button onclick="saveVault()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold text-xs transition-all">SAVE & BRIDGE</button>
                </div>
            </div>

            <div class="card p-6 rounded-2xl">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Spread Capture</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="strat_spread" onchange="toggleStrat('spread', this.checked)" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                    </label>
                </div>
            </div>
        </div>

        <div class="col-span-5 card p-6 rounded-2xl">
            <h3 class="text-xs font-black text-slate-500 tracking-widest uppercase mb-6">Active Inventory</h3>
            <div id="positionsList" class="space-y-3"></div>
        </div>

        <div class="col-span-4 card p-6 rounded-2xl overflow-hidden">
            <h3 class="text-xs font-black text-slate-500 tracking-widest uppercase mb-6">Engine Logs</h3>
            <div id="logs" class="space-y-2 h-[500px] overflow-y-auto font-mono text-[10px]"></div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('balancePaper').innerText = `$${d.balance_paper.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                document.getElementById('strat_spread').checked = d.stats.spread.active;
                
                const vStatus = document.getElementById('vault_status');
                if (d.vault_loaded) {
                    vStatus.innerText = "READY";
                    vStatus.className = "text-[10px] font-bold px-2 py-1 rounded bg-green-900 text-green-400";
                }

                const list = document.getElementById('positionsList');
                list.innerHTML = d.positions.map(p => `
                    <div class="p-4 bg-slate-900/50 border border-slate-800 rounded-xl flex justify-between items-center">
                        <div>
                            <p class="text-[10px] font-bold text-slate-500 uppercase">${p.market_id}</p>
                            <p class="text-xs font-mono">Entry: $${p.entry_price.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-blue-400 font-bold">$${p.size.toFixed(2)}</p>
                        </div>
                    </div>`).join('');
            } catch (e) {}
        }

        async function saveVault() {
            const formData = new FormData();
            formData.append('api_key', document.getElementById('api_key_id').value);
            formData.append('priv_key', document.getElementById('priv_key_body').value);
            const res = await fetch('/save_secrets', { method: 'POST', body: formData });
            if(res.ok) { alert("Vault Locked. Refreshing Engine."); location.reload(); }
        }

        async function toggleStrat(name, active) {
            const formData = new FormData();
            formData.append('strat', name); formData.append('active', active);
            await fetch('/toggle', { method: 'POST', body: formData });
        }

        const ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logDiv = document.getElementById('logs');
            const color = data.type === 'buy' ? 'border-green-500' : (data.type === 'sell' ? 'border-red-500' : 'border-blue-500');
            logDiv.innerHTML = `<div class="p-2 bg-slate-900/80 border-l-2 ${color} mb-1">
                <span class="text-slate-600">[${data.time}]</span> ${data.msg}
            </div>` + logDiv.innerHTML;
        };

        setInterval(fetchStatus, 3000);
        fetchStatus();
    </script>
</body>
</html>
