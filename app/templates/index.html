<!DOCTYPE html>
<html>
<head>
    <title>KalshiTerminal V9.6</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0f111a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #1a1d2e; border: 1px solid #2d314d; }
        .log-entry { font-family: 'Fira Code', monospace; font-size: 0.85rem; border-left: 3px solid #3b82f6; }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold tracking-tighter">KALSHI<span class="text-blue-500">TERMINAL</span> <span class="text-xs text-gray-500">V9.6</span></h1>
        
        <div class="flex gap-6">
            <div class="text-right">
                <p class="text-xs text-gray-500 uppercase">Real Balance</p>
                <p id="balanceReal" class="text-2xl font-bold">$0.00</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-blue-500 uppercase">Paper Balance</p>
                <p id="balancePaper" class="text-2xl font-bold text-blue-400">$0.00</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-6">
        <div class="col-span-3 space-y-6">
            <div class="card p-4 rounded-xl">
                <h3 class="text-xs font-bold text-blue-500 uppercase mb-4">Strategy Control</h3>
                <div class="flex items-center justify-between">
                    <span>Global Spread Capture</span>
                    <input type="checkbox" id="strat_spread" onchange="toggleStrat('spread', this.checked)" class="w-5 h-5">
                </div>
            </div>
        </div>

        <div class="col-span-6 card p-6 rounded-xl">
            <h3 class="text-sm font-bold uppercase mb-4">Active Positions</h3>
            <div id="positionsList" class="space-y-3"></div>
        </div>

        <div class="col-span-3 card p-4 rounded-xl h-96 overflow-y-auto">
            <h3 class="text-sm font-bold uppercase mb-4">System Log</h3>
            <div id="logs" class="space-y-2"></div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const res = await fetch('/api/status');
            const d = await res.json();
            
            // This ensures the checkbox matches the server's memory
            document.getElementById('strat_spread').checked = d.stats.spread.active;
            document.getElementById('balanceReal').innerText = `$${d.balance_real.toFixed(2)}`;
            document.getElementById('balancePaper').innerText = `$${d.balance_paper.toFixed(2)}`;

            const list = document.getElementById('positionsList');
            list.innerHTML = d.positions.map(p => `
                <div class="p-3 border border-gray-700 rounded flex justify-between">
                    <span>${p.market_id}</span>
                    <span class="font-bold text-green-400">$${p.size}</span>
                </div>
            `).join('');
        }

        async function toggleStrat(name, active) {
            const formData = new FormData();
            formData.append('strat', name);
            formData.append('active', active);
            await fetch('/toggle', { method: 'POST', body: formData });
        }

        // Real-time logs via WebSocket
        const ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logDiv = document.getElementById('logs');
            logDiv.innerHTML = `<div class="log-entry p-2 bg-gray-800 rounded">[${data.time}] ${data.msg}</div>` + logDiv.innerHTML;
        };

        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>
</html>
