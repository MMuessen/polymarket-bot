<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel V10.2 | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0d14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #161926; border: 1px solid #2d314d; }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black italic tracking-tighter">SENTINEL<span class="text-blue-500">V10</span></h1>
            <div class="flex bg-[#161926] rounded-full p-1 border border-slate-700">
                <button onclick="setMode('PAPER')" id="modePaper" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all">PAPER</button>
                <button onclick="setMode('LIVE')" id="modeLive" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all">LIVE</button>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-blue-500 font-black uppercase mb-1">Total Equity</p>
            <p id="balance" class="text-4xl font-mono font-bold text-white">$0.00</p>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3 space-y-6">
            <div class="card p-6 rounded-3xl border-red-900 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs font-black text-red-500 uppercase tracking-widest">API Vault</h3>
                    <span id="v_status" class="text-[9px] font-bold px-2 py-1 rounded bg-red-950 text-red-400">OFFLINE</span>
                </div>
                <input type="password" id="key_id" placeholder="Kalshi Key ID" class="w-full bg-black border border-slate-700 p-3 rounded-xl mb-4 text-xs text-white">
                <textarea id="priv_key" placeholder="Paste .pem Private Key" class="w-full bg-black border border-slate-700 p-3 rounded-xl h-32 text-[10px] mb-4 font-mono text-white"></textarea>
                <button onclick="saveVault()" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Connect Bridge</button>
            </div>
        </div>

        <div class="col-span-5 card p-6 rounded-3xl">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Active Inventory</h3>
            <div id="positions" class="space-y-3"></div>
        </div>

        <div class="col-span-4 card p-6 rounded-3xl">
            <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">System Terminal</h3>
            <div id="logs" class="space-y-2 h-[500px] overflow-y-auto font-mono text-[10px]"></div>
        </div>
    </div>

    <script>
        async function setMode(m) {
            const fd = new FormData(); fd.append('mode', m);
            await fetch('/api/set_mode', { method: 'POST', body: fd });
            updateUI();
        }

        async function saveVault() {
            const fd = new FormData();
            fd.append('api_key', document.getElementById('key_id').value);
            fd.append('priv_key', document.getElementById('priv_key').value);
            await fetch('/save_secrets', { method: 'POST', body: fd });
            location.reload();
        }

        async function updateUI() {
            const res = await fetch('/api/status');
            const d = await res.json();
            document.getElementById('balance').innerText = `$${d.balance.toFixed(2)}`;
            
            // Toggle Button Styles
            const pBtn = document.getElementById('modePaper');
            const lBtn = document.getElementById('modeLive');
            if(d.mode === 'PAPER') {
                pBtn.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-blue-600 text-white";
                lBtn.className = "px-4 py-1.5 rounded-full text-xs font-bold text-slate-500";
            } else {
                lBtn.className = "px-4 py-1.5 rounded-full text-xs font-bold bg-red-600 text-white";
                pBtn.className = "px-4 py-1.5 rounded-full text-xs font-bold text-slate-500";
            }

            if (d.vault_ready) {
                const s = document.getElementById('v_status');
                s.innerText = "BRIDGE READY"; s.className = "text-[9px] font-bold px-2 py-1 rounded bg-green-900 text-green-400";
            }

            document.getElementById('positions').innerHTML = d.positions.map(p => `
                <div class="p-4 bg-black/40 border border-slate-800 rounded-2xl flex justify-between items-center">
                    <div><p class="text-[10px] font-bold text-slate-500">${p.market_id}</p><p class="text-xs font-mono">$${p.entry_price.toFixed(2)}</p></div>
                    <div class="text-blue-400 font-bold">$${p.size.toFixed(2)}</div>
                </div>`).join('');
        }

        const ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const logs = document.getElementById('logs');
            const color = data.type === 'buy' ? 'border-green-500' : (data.type === 'sell' ? 'border-red-500' : 'border-blue-500');
            logs.innerHTML = `<div class="p-2 border-l-2 ${color} bg-slate-900/50 mb-1 rounded-r">
                <span class="text-slate-600">[${data.time}]</span> ${data.msg}
            </div>` + logs.innerHTML;
        };

        setInterval(updateUI, 3000); updateUI();
    </script>
</body>
</html>
