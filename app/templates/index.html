<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KalshiTerminal V10.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f111a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #1a1d2e; border: 1px solid #2d314d; }
    </style>
</head>
<body class="p-8">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold tracking-tighter">KALSHI<span class="text-blue-500">TERMINAL</span> <span class="text-xs text-gray-500">V10.2</span></h1>
        <div class="flex gap-6">
            <div class="text-right">
                <p class="text-xs text-blue-500 uppercase">Paper Balance</p>
                <p id="balancePaper" class="text-2xl font-bold text-blue-400">$0.00</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-12 gap-6">
        <div class="col-span-3 space-y-6">
            <div class="card p-4 rounded-xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-red-500 uppercase">API Vault</h3>
                    <span id="vault_status" class="text-[10px] bg-red-900 px-2 py-1 rounded text-red-400">NO KEYS</span>
                </div>
                <div class="space-y-3">
                    <input type="password" id="api_key_id" placeholder="Kalshi Key ID" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-xs">
                    <textarea id="priv_key_body" placeholder="Paste Private Key (.pem content)" class="w-full p-2 bg-gray-900 border border-gray-700 rounded text-xs h-20"></textarea>
                    <button onclick="saveSecrets()" class="w-full bg-red-600 hover:bg-red-700 p-2 rounded font-bold text-xs transition">Save & Lock</button>
                </div>
            </div>
            <div class="card p-4 rounded-xl">
                <div class="flex items-center justify-between">
                    <span class="text-sm">Global Spread Capture</span>
                    <input type="checkbox" id="strat_spread" onchange="toggleStrat('spread', this.checked)" class="w-5 h-5">
                </div>
            </div>
        </div>

        <div class="col-span-6 card p-6 rounded-xl">
            <h3 class="text-sm font-bold uppercase mb-4">Active Positions</h3>
            <div id="positionsList" class="space-y-3"></div>
        </div>

        <div class="col-span-3 card p-4 rounded-xl h-96 overflow-y-auto" id="logs"></div>
    </div>

    <script>
        async function fetchStatus() {
            const res = await fetch('/api/status');
            const d = await res.json();
            
            document.getElementById('balancePaper').innerText = `$${d.balance_paper.toFixed(2)}`;
            document.getElementById('strat_spread').checked = d.stats.spread.active;
            
            const vStatus = document.getElementById('vault_status');
            if (d.vault_loaded) {
                vStatus.innerText = "KEYS LOADED";
                vStatus.className = "text-[10px] bg-green-900 px-2 py-1 rounded text-green-400";
            }

            const list = document.getElementById('positionsList');
            list.innerHTML = d.positions.map(p => `
                <div class="p-3 border border-gray-700 rounded flex justify-between items-center">
                    <div class="text-xs uppercase font-bold text-gray-500">${p.market_id}</div>
                    <div class="text-green-400 font-bold">$${p.size}</div>
                </div>`).join('');
        }

        async function saveSecrets() {
            const formData = new FormData();
            formData.append('api_key', document.getElementById('api_key_id').value);
            formData.append('priv_key', document.getElementById('priv_key_body').value);
            await fetch('/save_secrets', { method: 'POST', body: formData });
            alert("Vault Updated.");
        }

        async function toggleStrat(name, active) {
            const formData = new FormData();
            formData.append('strat', name);
            formData.append('active', active);
            await fetch('/toggle', { method: 'POST', body: formData });
        }

        const ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logDiv = document.getElementById('logs');
            logDiv.innerHTML = `<div class="p-2 bg-gray-800 rounded mb-2 text-xs">[${data.time}] ${data.msg}</div>` + logDiv.innerHTML;
        };

        setInterval(fetchStatus, 3000);
        fetchStatus();
    </script>
</body>
</html>
