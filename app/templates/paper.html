<!DOCTYPE html>
<html class="dark">
<head>
    <title>Sentinel | Paper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#05070a] text-slate-300 font-mono text-[12px] h-screen flex overflow-hidden">
    <nav class="w-16 border-r border-slate-800 bg-[#0d1117] flex flex-col items-center py-6 space-y-8">
        <div class="text-blue-500 font-black">S_A</div>
        <a href="/" class="text-slate-600 hover:text-white"><i class="fas fa-wallet"></i></a>
        <a href="/paper" class="text-purple-500 bg-purple-500/10 p-2 rounded border border-purple-500/30"><i class="fas fa-flask"></i></a>
        <a href="/settings" class="text-slate-600 hover:text-white"><i class="fas fa-cog"></i></a>
    </nav>
    <div class="flex-1 p-12">
        <div class="max-w-4xl mx-auto space-y-12">
            <header class="flex justify-between items-end border-b border-slate-800 pb-8">
                <div>
                    <h1 class="text-3xl font-black text-purple-400">PAPER TRADING</h1>
                    <p class="text-slate-500 italic uppercase text-[10px] tracking-widest">Isolated Simulation Engine</p>
                </div>
                <div class="text-right">
                    <div class="text-4xl font-bold text-white">$10,000.00</div>
                    <div class="text-[9px] text-slate-500 uppercase tracking-tighter">Available Virtual Capital</div>
                </div>
            </header>
            <div class="grid grid-cols-2 gap-8">
                <div class="bg-[#0d1117] p-8 border border-slate-800 rounded-2xl">
                    <h2 class="font-bold text-white mb-4 uppercase">AI Learning Loop</h2>
                    <p class="text-slate-400 mb-6 leading-relaxed">The AI is currently analyzing market volatility using a $100 max ticket size in simulation mode.</p>
                    <button class="bg-purple-600 px-6 py-2 rounded font-bold text-white">RESTART SIMULATION</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
